<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Your CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <title>MindEase – Contact Us</title>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container-fluid">

            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="assets/images/logomind.png" alt="MindEase Logo" width="40" height="40" class="me-2">
                <strong>MindEase</strong>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html">Home</a>
                    <a class="nav-link" href="About.html">About</a>
                    <a class="nav-link" href="Services.html">Services</a>
                    <a class="nav-link active" href="Contact.html">Contact</a>
                </div>
            </div>

        </div>
    </nav>


    <!-- CONTACT FORM SECTION -->
    <section class="py-5">
        <div class="container">

            <div class="text-center mb-4">
                <h1 class="display-5 fw-bold">Get in Touch</h1>
                <p class="lead">We’re here to support your mental well-being. Reach out anytime.</p>
            </div>

            <div class="row justify-content-center">
                <div class="col-md-8">

                    <div class="card shadow-sm p-4">
                        <form>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Full Name</label>
                                <input type="text" class="form-control" placeholder="Enter your name" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email Address</label>
                                <input type="email" class="form-control" placeholder="Enter your email" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Subject</label>
                                <input type="text" class="form-control" placeholder="What is your message about?"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Message</label>
                                <textarea class="form-control" rows="5" placeholder="Write your message here..."
                                    required></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100">Send Message</button>

                        </form>
                    </div>

                </div>
            </div>

        </div>
    </section>


    <!-- SUBSCRIBE SECTION -->
    <section class="subscribe-section">
        <div class="subscribe-container">
            <div class="subscribe-text">
                <h2><strong>Stay informed</strong></h2>
                <p>Get helpful tips, resources, and updates straight to your inbox.</p>
            </div>

            <form class="subscribe-form">
                <input type="email" placeholder="Your email address" required>
                
                    <button type="submit">Subscribe</button>
                    <a href="contactsubmit.html" method="Get">
    <button type="submit">Subscribe</button>
</a>

                </a>
            </form>
        </div>
    </section>


    <!-- FOOTER -->
    <footer class="footer">
        <p class="footer-title">MindEase</p>

        <div class="footer-social">
            <a href="https://www.facebook.com" class="social-link"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="https://www.instagram.com" class="social-link"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.twitter.com" class="social-link"><i class="fa-brands fa-twitter"></i></a>
        </div>

        <p class="footer-copy">© 2026 MindEase. All rights reserved.</p>
    </footer>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
